<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grudge Art Online: SYSTEM CORE</title>
    <style>
        /* --- RETRO TERMINAL CSS --- */
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-columns: 70% 30%; /* Split Screen */
            text-shadow: 0 0 5px #00ff41;
        }

        /* Scanline Overlay */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* --- LEFT PANEL: CHAT --- */
        #main-console {
            border-right: 2px solid #00ff41;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: border-color 0.5s;
        }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 1.1em;
            white-space: pre-wrap;
        }
        /* Custom Scrollbar */
        #chat-box::-webkit-scrollbar { width: 8px; }
        #chat-box::-webkit-scrollbar-thumb { background: #00ff41; }

        .user { color: #fff; margin-top: 10px; }
        .system { color: #00ff41; margin-bottom: 10px; }
        
        #input-area { display: flex; border-top: 1px solid #00ff41; }
        input {
            flex: 1;
            background: #000;
            border: none;
            color: #fff;
            padding: 15px;
            font-family: inherit;
            font-size: 1.1em;
            outline: none;
        }
        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 0 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1em;
        }
        button:hover { background: #fff; }

        /* --- RIGHT PANEL: WORLD STATE --- */
        #side-panel {
            padding: 20px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
        }
        h2 { border-bottom: 1px solid; padding-bottom: 5px; margin-top: 0; font-size: 1.2em; }
        
        .stat-box {
            margin-bottom: 30px;
            border: 1px solid #00ff41;
            padding: 10px;
            transition: border-color 0.5s;
        }

        /* THREAT METER */
        #meter-container {
            width: 100%;
            height: 20px;
            background: #222;
            border: 1px solid #00ff41;
            margin-top: 10px;
            position: relative;
        }
        #meter-fill {
            height: 100%;
            width: 0%;
            background: #00ff41;
            transition: width 0.5s, background 0.5s;
            box-shadow: 0 0 10px #00ff41;
        }

        /* DYNAMIC CLASSES */
        .status-calm { color: #00ff41; border-color: #00ff41; }
        .status-warning { color: #ffae00 !important; border-color: #ffae00 !important; } /* Orange */
        .status-critical { color: #ff0000 !important; border-color: #ff0000 !important; animation: shake 0.5s infinite; } /* Red */

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            10% { transform: translate(-1px, -2px); }
            20% { transform: translate(-3px, 0px); }
            30% { transform: translate(3px, 2px); }
            40% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 2px); }
            60% { transform: translate(-3px, 1px); }
            70% { transform: translate(3px, 1px); }
            80% { transform: translate(-1px, -1px); }
            90% { transform: translate(1px, 2px); }
            100% { transform: translate(1px, -2px); }
        }
    </style>
</head>
<body>

    <div id="main-console">
        <div id="header">>> CONNECTION ESTABLISHED: UID_<span id="uid-display"></span></div>
        <div id="chat-box">
            <div class="system">SYSTEM: Welcome to Grudge Art Online. Actions have consequences.</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Enter command..." autofocus>
            <button onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <div id="side-panel">
        <div class="stat-box" id="box-threat">
            <h2>GLOBAL THREAT LEVEL</h2>
            <div id="anger-text">STABLE (0%)</div>
            <div id="meter-container">
                <div id="meter-fill"></div>
            </div>
        </div>

        <div class="stat-box" id="box-crime">
            <h2>LAST CRIME</h2>
            <div id="crime-log">None recorded...</div>
        </div>

        <div class="stat-box" id="box-ban">
            <h2>BANNED PLAYERS</h2>
            <div id="ban-count">0</div>
        </div>
    </div>

    <script>
        // Identity Management
        let userId = localStorage.getItem("user_id");
        if (!userId) {
            userId = "Player_" + Math.floor(Math.random() * 999);
            localStorage.setItem("user_id", userId);
        }
        document.getElementById("uid-display").innerText = userId;

        // --- CORE CHAT FUNCTION ---
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value;
            if (!text) return;

            // UI Update
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<div class="user">> ${userId}: ${text}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Send to Backend
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: text, user_id: userId })
                });
                const data = await response.json();
                
                chatBox.innerHTML += `<div class="system">SYSTEM: ${data.reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                
                // Immediate update of world state from response
                if(data.anger !== undefined) updateVisuals(data.anger);

            } catch (e) {
                chatBox.innerHTML += `<div class="system" style="color:red">ERROR: CONNECTION LOST</div>`;
            }
        }

        // Allow Enter Key
        document.getElementById("user-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        // --- POLLING FUNCTION (THE LIVE UPDATE) ---
        async function fetchWorldState() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                
                // Update Text
                document.getElementById("crime-log").innerText = data.last_crime;
                document.getElementById("ban-count").innerText = data.banned_count;
                
                // Update Visuals
                updateVisuals(data.anger);

            } catch(e) { console.log("Polling error:", e); }
        }

        // --- VISUAL MANAGER ---
        function updateVisuals(anger) {
            const meter = document.getElementById("meter-fill");
            const text = document.getElementById("anger-text");
            const body = document.body;
            const boxes = document.querySelectorAll('.stat-box');
            const mainConsole = document.getElementById("main-console");

            // Update Width
            meter.style.width = anger + "%";
            text.innerText = anger + "%";

            // Color Logic
            if (anger < 50) {
                // GREEN (Safe)
                meter.style.background = "#00ff41"; 
                text.innerText += " (STABLE)";
                
                // Reset Styles
                body.style.textShadow = "0 0 5px #00ff41";
                mainConsole.style.borderColor = "#00ff41";
                boxes.forEach(el => el.style.borderColor = "#00ff41");
                mainConsole.classList.remove("status-critical");

            } else if (anger < 80) {
                // ORANGE (Warning)
                meter.style.background = "#ffae00"; 
                text.innerText += " (WARNING)";
                
                // Orange Styles
                body.style.textShadow = "0 0 5px #ffae00";
                mainConsole.style.borderColor = "#ffae00";
                boxes.forEach(el => el.style.borderColor = "#ffae00");
                mainConsole.classList.remove("status-critical");

            } else {
                // RED (Critical)
                meter.style.background = "#ff0000"; 
                text.innerText += " (CRITICAL)";
                
                // Red Styles
                body.style.textShadow = "0 0 8px #ff0000";
                mainConsole.style.borderColor = "#ff0000";
                boxes.forEach(el => el.style.borderColor = "#ff0000");
                
                // Add shake effect
                mainConsole.classList.add("status-critical");
            }
        }

        // Poll every 2 seconds
        setInterval(fetchWorldState, 2000);
    </script>
</body>
</html>
